[module/launcher]
type = custom/text
content = ÓßĮ
content-margin = 0
click-left = rofi -show run
;The script above is to be found here : https://github.com/ngynLk/scripts

[module/workspaces]
type = internal/xworkspaces

pin-workspaces = true

enable-click = true

enable-scroll = false

icon-0 = 1;1
icon-1 = 2;2
icon-2 = 3;3
icon-3 = 4;4
icon-default = ÓĆ≥

format = <label-state>
format-margin = 4

label-active = %icon%
label-active-underline = ${colors.foreground}

label-occupied = %icon%

label-urgent = %icon%

label-empty = %icon%

label-active-padding = 2
label-urgent-padding = 2
label-occupied-padding = 2
label-empty-padding = 2

[module/updates]
type=custom/script
exec = yay -Qu | wc -l
exec-if = [[ $(yay -Qu | wc -l) != 0 ]]
format = Óźö  <label> update(s) available.
format-margin = 8
tail = true
interval = 30
click-left = urxvt -e yay -Syu

[module/xwindow]
type = internal/xwindow
label = %title:0:75:...%
label-empty = Empty 
label-empty-font = 2
label-font = 2
format-margin = 4

[module/wlan]
type = internal/network
interface = wlx0013eff2094e
interval = 3.0

format-connected = Ôáę <label-connected>
label-connected = %essid%
label-connected-color1 = ${colors.color1}

format-disconnected = <label-disconnected>
label-disconnected = %ifname% disconnected
label-disconnected-color1 = ${colors.color1}

ramp-signal-0 = Óąė
ramp-signal-1 = Óąô
ramp-signal-2 = Óąö
ramp-signal-3 = Óąö
ramp-signal-4 = Óąö
ramp-signal-color1 = ${colors.color1}

[module/time]
type = internal/date
interval = 1.0
format-margin = 4

time = "%H:%M"
date = "%d %b"

time-alt = "%H:%M:%S"
date-alt = "%d %B %Y"

label = %time% / %date%
label-background = ${colors.background}
label-padding = 2


[module/pulseaudio]
type = internal/pulseaudio

format-volume-margin = 0
format-volume = <ramp-volume><label-volume>
label-volume = %percentage:4:4%%
format-volume-background = ${colors.background}
format-volume-padding = 2
use-ui-max = false
interval = 5

ramp-volume-0 = "%{T4}ÓĀé%{T-}"
ramp-volume-1 = "%{T4}ÓĀć%{T-}"
ramp-volume-2 = "%{T4}ÓĀź%{T-}"

label-muted = "%{T4}ÓĀŹ%{T-} 0%"
label-muted-background = ${colors.background}
label-muted-padding = 2

[module/mpd]
type = internal/mpd
host = 127.0.0.1
port = 6600

interval = 1


format-online = <icon-prev> <toggle> <icon-next> <label-song>
format-online-padding = 4

format-offline = <label-offline>
format-offline-padding = 4
format-offline-prefix = "%{T4}Óé°%{T-}"

label-offline = " Offline"

label-song = " %artist% - %title%"
label-song-maxlen = 25
label-song-ellipsis = true

icon-prev = "%{T4}ÓĀÖ%{T-}"
icon-next = "%{T4}ÓĀĄ%{T-}"
icon-pause = "%{T4}ÓÄī%{T-}"
icon-play = "%{T4}ÓÄ∑%{T-}"

[module/temperature]
type = internal/temperature
thermal-zone = 0
warn-temperature = 60

format =  <label>
format-warn = <ramp> <label-warn>

label = %temperature-c%
label-warn = %temperature-c%
label-warn-color1 = ${colors.secondary}

ramp-0 = Ôčč
ramp-1 = ÔčČ
ramp-2 = ÓÉč

[module/powermenu]
type = custom/menu

expand-right = false

format-margin = 2
format-spacing = 2

label-open = ÓĘ¨
label-close = ÓóČ
label-separator = |

; reboot
menu-0-1 = Óźö
menu-0-1-exec = menu-open-2
; poweroff
menu-0-2 = ÓĘ¨
menu-0-2-exec = menu-open-3
; logout
menu-0-0 = Óóö
menu-0-0-exec = menu-open-1

menu-2-0 = Óźö
menu-2-0-exec = reboot

menu-3-0 = ÓĘ¨
menu-3-0-exec = poweroff

menu-1-0 = Óóö
menu-1-0-exec = i3-msg exit || openbox --exit

[module/spotify]
type = custom/script
format-margin = 4
format = ÔÜľ   <label>
exec = playerctl metadata --format '{{artist}}: {{title}}'
tail = true
interval = 1
click-left = "playerctl play-pause"

[settings]
screenchange-reload = true
;compositing-background = xor
;compositing-background = screen
;compositing-foreground = source
;compositing-border = over
pseudo-transparency = false

[global/wm]
margin-top = 0
margin-bottom = 0

